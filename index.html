<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字间 - 法律声明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f2e6;
            color: #5c3d2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4bc 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: #8b6914;
            border: 2px solid rgba(176, 128, 80, 0.3);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #5c3d2e;
        }
        .subtitle {
            color: #8b7355;
            margin-bottom: 3rem;
            font-size: 0.95rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .link-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(176, 128, 80, 0.2);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: #5c3d2e;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .link-card:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(92, 61, 46, 0.1);
        }
        .link-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #d4a574 0%, #b08050 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .link-info {
            text-align: left;
            flex: 1;
        }
        .link-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        .link-desc {
            font-size: 0.85rem;
            color: #8b7355;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #a08060;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1510;
                color: #f0d9b5;
            }
            h1 {
                color: #f0d9b5;
            }
            .subtitle {
                color: #b8a080;
            }
            .link-card {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(212, 165, 116, 0.2);
                color: #f0d9b5;
            }
            .link-card:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .link-desc {
                color: #b8a080;
            }
            .footer {
                color: #8b7355;
            }
            .logo {
                background: linear-gradient(135deg, #3d2e22 0%, #2a2018 100%);
                border-color: rgba(212, 165, 116, 0.3);
                color: #d4a574;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">字间</div>
        <h1>字间</h1>
        <p class="subtitle">文字流转 · 温雅有度</p>
        
        <div class="links">
            <a href="terms.html" class="link-card">
                <div class="link-icon">📄</div>
                <div class="link-info">
                    <div class="link-title">用户服务协议</div>
                    <div class="link-desc">字间应用用户服务条款</div>
                </div>
            </a>
            <a href="privacy.html" class="link-card">
                <div class="link-icon">🔒</div>
                <div class="link-info">
                    <div class="link-title">隐私政策</div>
                    <div class="link-desc">我们如何保护您的隐私</div>
                </div>
            </a>
        </div>
        
        <div class="footer">
            © 2026 字间 · 个人开发者
        </div>
    </div>
</body>
</html>
